{% comment %} Theme Init {% endcomment %}
<script>
  (function () {
    var themeKey = "mmdocs_local_theme";
    var root = document.documentElement;
    var theme = "light";

    try {
      var storedTheme = localStorage.getItem(themeKey);
      if (storedTheme === "dark" || storedTheme === "light") {
        theme = storedTheme;
      } else if (
        window.matchMedia &&
        window.matchMedia("(prefers-color-scheme: dark)").matches
      ) {
        theme = "dark";
      }
    } catch (e) {
      if (
        window.matchMedia &&
        window.matchMedia("(prefers-color-scheme: dark)").matches
      ) {
        theme = "dark";
      }
    }

    root.setAttribute("data-mmdocs-theme", theme);
  })();
</script>
