url: https://susee.js.org/
# site
title: susee
source: docs
markdown:  KramdownShiki_Fixed
# kramdown:
#   syntax_highlighter: none
sass:
  style: compressed
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-pagefind
  - jekyll-minify-js
  - jekyll-tabler
  - jekyll-include-cache
exclude:
  - Makefile
minify_js:
  enabled: true # disable to skip minification
  entry_dir: public/js
  output_dir: js # destination directory under site dest
  terser_opts:
    compress: true # enable compression
    mangle: true # enable name mangling
    source_map: true # produce .map files
jekyll_pagefind:
  quiet: true
# mmdocs theme
mmdocs:
  description: TypeScript-first bundler for library packages
  keywords:
    - bundler
    - library
    - typescript
  logo:
    light: /images/logo-light.webp
    dark: /images/logo-dark.webp
  giscus:
    repo: phothinmg/susee
    repo_id: R_kgDORCj2TQ
    category: General
    category_id: DIC_kwDORCj2Tc4C7st0
    mapping: pathname
    strict: "0"
    reactions_enabled: "1"
    emit_metadata: "0"
    input_position: bottom
    theme: dark
    lang: en
  docs:
    - label: Coverage
      link: /coverage
      nav: true
    - label: Guide
      link: /guide/quick-start
      nav: true
      sidebar:
        - sidebar_label: Introduction
          items:
            - text: What is Susee?
              link: /guide/what-is-susee
            - text: Key Features
              link: /guide/key-features
            - text: Quick Start
              link: /guide/quick-start
        - sidebar_label: Configuration
          items:
            - text: Configuration File Structure
              link: /guide/config-file-structure
            - text: Entry Points
              link: /guide/entry-points
            - text: tsconfig & Custom Path Integration
              link: /guide/tsconfig-and-custom-path-integration
        - sidebar_label: Plugin System
          items:
            - text: Plugin Types and Lifecycle
              link: /guide/plugin-types-lifecycle
            - text: How to Write Plugins
              link: /guide/how-to-write-plugins
        - sidebar_label: Ecosystem
          items:
            - text: Ecosystem Overview
              link: /guide/ecosystem-overview
            - text: Core Build Packages
              link: /guide/ecosystem-core-build-packages
            - text: Plugin Packages
              link: /guide/ecosystem-plugin-packages
            - text: Foundation Packages
              link: /guide/ecosystem-foundation-packages
        - sidebar_label: Contribution
          items:
            - text: Contribution Overview
              link: /guide/contribution-overview
            - text: Contributing to Susee
              link: /guide/contribution-susee
            - text: Contributing to Core Build Packages
              link: /guide/contribution-core-build-packages
            - text: Pull Request Checklist
              link: /guide/contribution-pr-checklist
    - label: References
      link: /references/command-line-interface
      nav: true
      sidebar:
        - sidebar_label: CLI and API Usage
          items:
            - text: Command Line Interface
              link: /references/command-line-interface
            - text: Programmatic API
              link: /references/programmatic-api
            - text: Glossary
              link: /references/glossary
  footer:
    copyright:
      owner: Susee
      link: https://susee.js.org/
    social_links:
      - icon: ti-brand-github
        href: https://github.com/phothinmg/mmdevs.org
      - icon: ti-mail
        href: mailto:phothinmg@disroot.org
exclude:
  - Makefile
  - node_modules/
  - vendor/
  - .jekyll-cache/
  - .sass-cache/
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json